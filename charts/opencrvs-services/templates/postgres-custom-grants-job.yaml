apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-custom-grants
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ default 0 .Values.postgres.customGrantsJob.backoffLimit }}
  template:
    metadata:
      name: postgres-custom-grants
    spec:
      restartPolicy: Never
      containers:
        - name: postgres-custom-grants
          image: {{ .Values.postgres.customGrantsJob.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - /work/apply-custom-grants.sh
          env:
            - name: POSTGRES_HOST
              value: {{ required "postgres.host is required" .Values.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ default "5432" .Values.postgres.port | quote }}
            - name: POSTGRES_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.adminSecret.name }}
                  key: {{ default "username" .Values.postgres.adminSecret.usernameKey }}
            - name: POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.adminSecret.name }}
                  key: {{ default "password" .Values.postgres.adminSecret.passwordKey }}
          volumeMounts:
            - name: custom-grants
              mountPath: /work
      volumes:
        - name: custom-grants
          configMap:
            name: postgres-custom-grants
            defaultMode: 0755
