---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: notification
    service_name: opencrvs_notification
  name: notification
spec:
  replicas: {{ .Values.notification.replicas | default 1 }}
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      annotations:
        lastdeploy-timestamp: {{ now | quote }}
      labels:
        app: notification
        service_name: opencrvs_notification
    spec:
      {{- with .Values.platform.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: notification
          image: {{ include "opencrvs.image" (dict "root" . "service" .Values.notification) }}
          env:
            - name: APN_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CERT_PUBLIC_KEY_PATH
              value: /secrets/public-key.pem
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "{{ .Values.notification.port }}"
            - name: COUNTRY_CONFIG_URL
              value: http://countryconfig.{{ .Release.Namespace }}.svc.cluster.local:3040
            - name: USER_MANAGEMENT_URL
              value: http://user-mgnt.{{ .Release.Namespace }}.svc.cluster.local:3030/
          {{- if eq .Values.mongodb.auth_mode "disabled" }}
            - name: MONGO_URL
              value: mongodb://{{ .Values.mongodb.host }}/notification
          {{- else if or (eq .Values.mongodb.auth_mode "auto")  (eq .Values.mongodb.auth_mode "use_secret") }}
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  key: NOTIFICATION_MONGO_URL
                  name: {{ .Values.mongodb.urls_secret }}
          {{- end }}
          {{- include "render-env-vars" (dict "service_name" "notification" "Values" .Values) }}
          {{- include "resources-helper" (dict "service_name" "notification" "Values" .Values) | indent 10 }}
          {{- include "probes-helper" (dict "service_name" "notification" "Values" .Values) | indent 10 }}
          ports:
            - containerPort: {{ .Values.notification.port }}
              protocol: TCP
          volumeMounts:
            - mountPath: /secrets/public-key.pem
              name: public-key
              subPath: public-key.pem
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: public-key.pem
                path: public-key.pem
            name: {{ .Release.Name }}-cert-tls
          name: public-key

{{- include "service-helper" (dict "service_name" "notification" "Values" .Values) }}

{{- include "hpa-helper" (dict "service_name" "notification" "Values" .Values) }}

{{- include "pdb-helper" (dict "service_name" "notification" "Values" .Values) }}
