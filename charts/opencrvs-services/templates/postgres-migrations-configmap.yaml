apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  migrate.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    run_migration() {
      local database="$1"
      local schema="$2"
      local role="$3"
      local username_env="$4"
      local password_env="$5"

      export DB_HOST="${DB_HOST}"
      export DB_PORT="${DB_PORT:-5432}"
      export DB_NAME="${database}"
      export DB_SCHEMA="${schema}"
      export DB_USER="${!username_env}"
      export DB_PASSWORD="${!password_env}"

      echo "==> Running migration for ${database}.${schema} as ${role}"

      # Replace this with your actual migration command
      # Example:
      # node dist/migrate.js
      # yarn migration:run
      # ./scripts/run-migrations.sh
      /app/run-migrations.sh
    }

{{- range $dbName, $dbCfg := .Values.postgres.databases }}
{{- range $schemaName, $schemaCfg := $dbCfg.schemas }}
{{- if $schemaCfg.runMigrations }}
    run_migration \
      "{{ $dbName }}" \
      "{{ $schemaName }}" \
      "{{ $schemaCfg.migratorRole }}" \
      "{{ include "env-safe" $schemaCfg.migratorRole }}_USERNAME" \
      "{{ include "env-safe" $schemaCfg.migratorRole }}_PASSWORD"
{{- end }}
{{- end }}
{{- end }}

    echo "All migrations completed"
